<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班級互動工具</title>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      min-height: 100vh;
    }
    .header {
      text-align: center;
      padding: 20px 15px 10px;
    }
    .header h1 { font-size: 1.8rem; color: #f39c12; }
    .header p { color: #888; font-size: 0.9rem; margin-top: 4px; }

    /* 工具列：tabs + QR 按鈕在同一列 */
    .toolbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin: 12px auto;
      max-width: 700px;
      padding: 0 15px;
    }
    .tabs {
      display: flex;
      gap: 4px;
      flex: 1;
      max-width: 360px;
    }
    .tab {
      flex: 1;
      padding: 10px 16px;
      text-align: center;
      cursor: pointer;
      border: none;
      background: #16213e;
      color: #888;
      font-size: 1rem;
      border-radius: 8px;
      transition: all 0.3s;
    }
    .tab.active {
      background: #0f3460;
      color: #f39c12;
      font-weight: bold;
    }
    .tab:hover { background: #0f3460; color: #ddd; }

    .panel { display: none; padding: 10px 15px; }
    .panel.active { display: block; }

    /* === 文字雲 === */
    #wordcloud {
      width: 100%;
      max-width: 900px;
      min-height: 350px;
      background: #16213e;
      border-radius: 12px;
      padding: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      align-content: center;
      gap: 12px;
      margin: 10px auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .word-item {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: default;
      transition: all 0.3s ease;
      animation: fadeIn 0.5s ease;
    }
    .word-item:hover { transform: scale(1.1); background: rgba(243,156,18,0.15); }
    @keyframes fadeIn { from { opacity:0; transform:scale(0.5); } to { opacity:1; transform:scale(1); } }

    .wc-input-area {
      display: flex; gap: 10px; margin: 15px auto;
      width: 100%; max-width: 500px;
    }
    .wc-input-area input {
      flex: 1; padding: 12px 18px; border: 2px solid #333; border-radius: 8px;
      background: #16213e; color: #eee; font-size: 1rem; outline: none;
    }
    .wc-input-area input:focus { border-color: #f39c12; }
    .wc-input-area button {
      padding: 12px 24px; background: #f39c12; color: #1a1a2e;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer;
    }
    .wc-input-area button:hover { background: #e67e22; }
    .stats {
      display: flex; gap: 20px; justify-content: center; margin: 10px 0;
      color: #888; font-size: 0.9rem;
    }
    .stats span { color: #f39c12; font-weight: bold; }
    .clear-btn {
      padding: 4px 12px; background: #e74c3c; color: white;
      border: none; border-radius: 4px; cursor: pointer; font-size: 0.75rem;
    }

    /* === 投票 === */
    .poll-setup {
      max-width: 600px; margin: 0 auto 20px;
      background: #16213e; border-radius: 12px; padding: 20px;
    }
    .poll-setup h3 { color: #f39c12; margin-bottom: 12px; }
    .poll-setup input, .poll-setup textarea {
      width: 100%; padding: 10px 14px; margin-bottom: 8px;
      background: #1a1a2e; border: 1px solid #333; border-radius: 6px;
      color: #eee; font-size: 0.95rem; outline: none;
    }
    .poll-setup input:focus { border-color: #f39c12; }
    .option-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
    .option-row input { flex: 1; margin-bottom: 0; }
    .option-row .remove-opt {
      background: #e74c3c; color: white; border: none; border-radius: 4px;
      width: 30px; height: 30px; cursor: pointer; font-size: 1.1rem;
    }
    .add-opt-btn {
      background: none; border: 1px dashed #555; color: #888;
      padding: 8px; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 10px;
    }
    .add-opt-btn:hover { border-color: #f39c12; color: #f39c12; }
    .poll-setup .start-btn {
      width: 100%; padding: 12px; background: #2ecc71; color: #1a1a2e;
      border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
    }
    .poll-setup .start-btn:hover { background: #27ae60; }
    .poll-setup .stop-btn {
      width: 100%; padding: 12px; background: #e74c3c; color: white;
      border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
    }

    .poll-results {
      max-width: 600px; margin: 0 auto;
      background: #16213e; border-radius: 12px; padding: 20px;
    }
    .poll-results h2 { color: #f39c12; margin-bottom: 4px; font-size: 1.3rem; }
    .poll-results .poll-question { color: #ccc; margin-bottom: 20px; font-size: 1.1rem; }
    .poll-results .total-votes { color: #888; font-size: 0.85rem; margin-bottom: 15px; }
    .bar-row {
      display: flex; align-items: center; margin-bottom: 10px;
      animation: slideIn 0.5s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
    .bar-label { width: 100px; text-align: right; padding-right: 12px; font-size: 0.95rem; flex-shrink: 0; }
    .bar-track { flex: 1; height: 36px; background: #1a1a2e; border-radius: 6px; overflow: hidden; position: relative; }
    .bar-fill {
      height: 100%; border-radius: 6px; transition: width 0.5s ease;
      display: flex; align-items: center; padding-left: 10px;
      font-weight: bold; font-size: 0.85rem; min-width: 30px;
    }
    .bar-count { margin-left: 10px; font-size: 0.85rem; color: #888; width: 40px; flex-shrink: 0; }

    .no-poll { color: #666; text-align: center; padding: 40px; }

    /* 圖片題目 */
    .paste-zone {
      border: 2px dashed #555; border-radius: 10px; padding: 20px;
      text-align: center; margin-bottom: 12px; transition: all 0.3s;
      cursor: pointer; color: #888; position: relative;
    }
    .paste-zone:hover, .paste-zone.dragover {
      border-color: #f39c12; color: #f39c12; background: rgba(243,156,18,0.05);
    }
    .paste-zone .hint { font-size: 0.85rem; margin-top: 6px; }
    .paste-zone .hint kbd {
      background: #333; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem;
      border: 1px solid #555;
    }
    .paste-preview {
      display: none; position: relative; margin-bottom: 12px;
      border-radius: 8px; overflow: hidden; background: #0a0a1a;
    }
    .paste-preview img {
      width: 100%; max-height: 300px; object-fit: contain; display: block;
      border-radius: 8px;
    }
    .paste-preview .remove-img {
      position: absolute; top: 8px; right: 8px;
      background: rgba(231,76,60,0.9); color: white; border: none;
      border-radius: 50%; width: 30px; height: 30px; cursor: pointer;
      font-size: 1rem; display: flex; align-items: center; justify-content: center;
    }
    .paste-preview .remove-img:hover { background: #e74c3c; }

    .embed-note {
      margin: 20px auto; padding: 12px 20px; background: #0f3460;
      border-radius: 8px; font-size: 0.8rem; color: #aaa;
      text-align: center; max-width: 700px;
    }
    .embed-note code { background: #1a1a2e; padding: 2px 6px; border-radius: 4px; color: #f39c12; }

    .submit-link {
      display: inline-block; margin-top: 10px; padding: 8px 20px;
      background: #3498db; color: white; text-decoration: none;
      border-radius: 6px; font-size: 0.9rem;
    }
    .submit-link:hover { background: #2980b9; }

    /* QR Code */
    .qr-toggle {
      padding: 10px 16px;
      background: #9b59b6; color: white; border: none; border-radius: 8px;
      font-size: 0.9rem; cursor: pointer; transition: background 0.3s;
      white-space: nowrap;
    }
    .qr-toggle:hover { background: #8e44ad; }
    .qr-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 100;
      justify-content: center; align-items: center; flex-direction: column;
    }
    .qr-overlay.show { display: flex; }
    .qr-box {
      background: #fff; border-radius: 20px; padding: 40px;
      text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      position: relative; max-width: 90vw;
    }
    .qr-box h2 { color: #1a1a2e; margin-bottom: 8px; font-size: 1.4rem; }
    .qr-box p { color: #666; margin-bottom: 20px; font-size: 1rem; }
    #qrcode { display: inline-block; margin-bottom: 20px; }
    .qr-url { color: #888; font-size: 0.8rem; word-break: break-all; max-width: 300px; margin: 0 auto 15px; }
    .qr-close {
      position: absolute; top: 15px; right: 20px; background: none;
      border: none; font-size: 1.8rem; color: #999; cursor: pointer;
    }
    .qr-close:hover { color: #e74c3c; }
    .qr-hint { color: #555; font-size: 0.9rem; margin-top: 10px; }

    @media (max-width: 600px) {
      .header h1 { font-size: 1.4rem; }
      #wordcloud { min-height: 250px; padding: 15px; gap: 8px; }
      .bar-label { width: 60px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎯 班級互動工具</h1>
    <p>文字雲 × 即時投票</p>
    <a class="submit-link" id="submitPageLink" target="_blank">📱 學生互動頁（新分頁開啟）</a>
  </div>

  <!-- QR Code 全螢幕浮層 -->
  <div class="qr-overlay" id="qrOverlay" onclick="if(event.target===this)toggleQR()">
    <div class="qr-box">
      <button class="qr-close" onclick="toggleQR()">✕</button>
      <h2>📱 掃碼加入互動</h2>
      <p>用手機掃描下方 QR Code</p>
      <div id="qrcode"></div>
      <div class="qr-url" id="qrUrl"></div>
      <p class="qr-hint">支援文字雲提交 + 即時投票</p>
    </div>
  </div>

  <!-- 工具列：Tab + QR 在同一列 -->
  <div class="toolbar">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('wordcloud')">☁️ 文字雲</button>
      <button class="tab" onclick="switchTab('voting')">📊 即時投票</button>
    </div>
    <button class="qr-toggle" onclick="toggleQR()">📷 QR Code</button>
  </div>

  <!-- 文字雲面板 -->
  <div id="panel-wordcloud" class="panel active">
    <div style="max-width:900px; margin:0 auto;">
      <div class="stats">
        <div>總字數：<span id="totalCount">0</span></div>
        <div>不重複：<span id="uniqueCount">0</span></div>
        <button class="clear-btn" onclick="clearWords()">🗑 清除</button>
      </div>
      <div id="wordcloud"><p style="color:#666;">等待資料中...</p></div>
      <div class="wc-input-area">
        <input type="text" id="wordInput" placeholder="輸入關鍵字..." maxlength="20">
        <button onclick="addWord()">送出</button>
      </div>
    </div>
  </div>

  <!-- 投票面板 -->
  <div id="panel-voting" class="panel">
    <div class="poll-setup" id="pollSetup">
      <h3>⚙️ 設定投票</h3>
      <div class="paste-zone" id="pasteZone" onclick="document.getElementById('pasteInput').click()">
        <div>📋 貼上題目圖片</div>
        <div class="hint">按 <kbd>Ctrl</kbd> + <kbd>V</kbd> 貼上截圖，或點此選擇檔案</div>
        <input type="file" id="pasteInput" accept="image/*" style="display:none" onchange="handleFileSelect(event)">
      </div>
      <div class="paste-preview" id="pastePreview">
        <img id="previewImg" src="">
        <button class="remove-img" onclick="removeImage()">✕</button>
      </div>
      <input type="text" id="pollQuestion" placeholder="請輸入投票問題（可與圖片併用）..." value="你最喜歡哪個主題？">
      <div id="optionsContainer">
        <div class="option-row">
          <input type="text" class="opt-input" placeholder="選項 1" value="選項A">
          <button class="remove-opt" onclick="removeOption(this)">✕</button>
        </div>
        <div class="option-row">
          <input type="text" class="opt-input" placeholder="選項 2" value="選項B">
          <button class="remove-opt" onclick="removeOption(this)">✕</button>
        </div>
        <div class="option-row">
          <input type="text" class="opt-input" placeholder="選項 3" value="選項C">
          <button class="remove-opt" onclick="removeOption(this)">✕</button>
        </div>
      </div>
      <button class="add-opt-btn" onclick="addOption()">＋ 新增選項</button>
      <button class="start-btn" id="startPollBtn" onclick="startPoll()">📢 開始投票</button>
      <button class="stop-btn" id="stopPollBtn" onclick="stopPoll()" style="display:none;">⏹ 結束投票</button>
    </div>

    <div class="poll-results" id="pollResults" style="display:none;">
      <h2>📊 投票結果</h2>
      <div class="poll-question" id="activeQuestion"></div>
      <div class="total-votes">總投票數：<span id="voteTotalCount">0</span></div>
      <div id="voteBars"></div>
    </div>
    <div class="no-poll" id="noPollMsg">目前沒有進行中的投票</div>
  </div>

  <div class="embed-note">
    🔗 學生提交網址：<code id="submitUrl">載入中...</code>
    <br>📋 嵌入簡報：<code id="embedCode">載入中...</code>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA9ZPLKpVbf3f-fQXzzMIcAIDhq9awDY3Q",
      authDomain: "my-teaching-tools-60a6f.firebaseapp.com",
      projectId: "my-teaching-tools-60a6f",
      storageBucket: "my-teaching-tools-60a6f.firebasestorage.app",
      messagingSenderId: "431880019604",
      appId: "1:431880019604:web:795dbcbd41597c57431e81"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ===== Tab 切換 + 模式控制 =====
    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
      document.getElementById(`panel-${name}`).classList.add('active');

      // 同步模式到 Firestore，讓學生端自動切換
      const modeMap = { wordcloud: 'wordcloud', voting: 'voting' };
      db.collection('active_mode').doc('current').set({
        mode: modeMap[name] || 'wordcloud',
        updated_at: firebase.firestore.FieldValue.serverTimestamp()
      });
    }

    // ===== 文字雲 =====
    const COLORS = ['#f39c12','#e74c3c','#2ecc71','#3498db','#9b59b6','#1abc9c','#e67e22','#f1c40f'];
    const SIZES = [14,18,22,26,32,38,46];
    let wordMap = new Map();

    function getWordSize(count) {
      const maxCount = Math.max(...wordMap.values(), 1);
      return SIZES[Math.min(Math.floor((count/maxCount) * SIZES.length), SIZES.length-1)];
    }
    function getWordColor(w) {
      let h = 0;
      for (let i = 0; i < w.length; i++) h = w.charCodeAt(i) + ((h<<5)-h);
      return COLORS[Math.abs(h)%COLORS.length];
    }
    function renderWordCloud() {
      const c = document.getElementById('wordcloud');
      c.innerHTML = '';
      if (wordMap.size === 0) {
        c.innerHTML = '<p style="color:#666;">還沒有資料，請學生提交關鍵字 ✨</p>';
        document.getElementById('totalCount').textContent = '0';
        document.getElementById('uniqueCount').textContent = '0';
        return;
      }
      const sorted = [...wordMap.entries()].sort((a,b) => b[1]-a[1]);
      sorted.forEach(([word, count]) => {
        const el = document.createElement('span');
        el.className = 'word-item';
        el.style.fontSize = getWordSize(count) + 'px';
        el.style.color = getWordColor(word);
        el.textContent = word;
        el.title = `${word}: ${count} 次`;
        c.appendChild(el);
      });
      document.getElementById('totalCount').textContent = sorted.reduce((s, [,c]) => s+c, 0);
      document.getElementById('uniqueCount').textContent = sorted.length;
    }
    function addWord() {
      const v = document.getElementById('wordInput').value.trim();
      if (!v) return;
      db.collection('wordcloud_words').add({ word: v, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
      document.getElementById('wordInput').value = '';
    }
    document.getElementById('wordInput').addEventListener('keypress', e => { if (e.key === 'Enter') addWord(); });
    function clearWords() {
      if (!confirm('確定清除所有文字雲資料？')) return;
      db.collection('wordcloud_words').get().then(s => {
        const b = db.batch();
        s.docs.forEach(d => b.delete(d.ref));
        return b.commit();
      });
    }
    db.collection('wordcloud_words').orderBy('timestamp','asc').onSnapshot(s => {
      wordMap.clear();
      s.forEach(d => { const w = d.data().word; if (w) wordMap.set(w.trim(), (wordMap.get(w.trim())||0)+1); });
      renderWordCloud();
    });

    // ===== 投票 =====
    let currentPollId = null;
    let pollListener = null;
    let votesListener = null;
    let pollImageData = null; // base64 圖片

    // --- 圖片貼上功能 ---
    const pasteZone = document.getElementById('pasteZone');
    const pastePreview = document.getElementById('pastePreview');
    const previewImg = document.getElementById('previewImg');

    document.addEventListener('paste', function(e) {
      // 只在投票面板啟用時處理
      if (!document.getElementById('panel-voting').classList.contains('active')) return;
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const blob = item.getAsFile();
          compressAndPreview(blob);
          return;
        }
      }
    });

    pasteZone.addEventListener('dragover', function(e) {
      e.preventDefault(); this.classList.add('dragover');
    });
    pasteZone.addEventListener('dragleave', function() {
      this.classList.remove('dragover');
    });
    pasteZone.addEventListener('drop', function(e) {
      e.preventDefault(); this.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) compressAndPreview(file);
    });

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (file) compressAndPreview(file);
    }

    function compressAndPreview(file) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const MAX_W = 800, MAX_H = 600;
          let w = img.width, h = img.height;
          if (w > MAX_W || h > MAX_H) {
            const ratio = Math.min(MAX_W / w, MAX_H / h);
            w = Math.round(w * ratio);
            h = Math.round(h * ratio);
          }
          canvas.width = w;
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          pollImageData = canvas.toDataURL('image/jpeg', 0.7);
          previewImg.src = pollImageData;
          pastePreview.style.display = 'block';
          pasteZone.style.display = 'none';
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    function removeImage() {
      pollImageData = null;
      pastePreview.style.display = 'none';
      pasteZone.style.display = 'block';
      document.getElementById('pasteInput').value = '';
    }

    function addOption() {
      const container = document.getElementById('optionsContainer');
      const div = document.createElement('div');
      div.className = 'option-row';
      const idx = container.children.length + 1;
      div.innerHTML = `
        <input type="text" class="opt-input" placeholder="選項 ${idx}" value="選項${String.fromCharCode(64+idx)}">
        <button class="remove-opt" onclick="removeOption(this)">✕</button>`;
      container.appendChild(div);
    }
    function removeOption(btn) {
      const container = document.getElementById('optionsContainer');
      if (container.children.length <= 2) return;
      btn.parentElement.remove();
    }

    function startPoll() {
      const question = document.getElementById('pollQuestion').value.trim();
      const inputs = document.querySelectorAll('.opt-input');
      const options = [...inputs].map(i => i.value.trim()).filter(v => v);
      if (!question && !pollImageData) { alert('請輸入問題或貼上圖片'); return; }
      if (options.length < 2) { alert('請至少 2 個選項'); return; }

      const pollData = {
        question: question || '',
        options, active: true,
        created_at: firebase.firestore.FieldValue.serverTimestamp()
      };
      if (pollImageData) pollData.image = pollImageData;

      db.collection('active_poll').doc('current').set(pollData);
      // 貼上圖片後不清除，讓投票期間持續顯示
    }

    function stopPoll() {
      db.collection('active_poll').doc('current').update({ active: false });
      // 投票結束，切回文字雲模式
      db.collection('active_mode').doc('current').set({
        mode: 'wordcloud',
        updated_at: firebase.firestore.FieldValue.serverTimestamp()
      });
    }

    const BAR_COLORS = ['#3498db','#e74c3c','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#f1c40f'];

    function renderVoteResults(question, options, votesMap, imageData) {
      document.getElementById('pollResults').style.display = 'block';
      document.getElementById('noPollMsg').style.display = 'none';
      document.getElementById('activeQuestion').textContent = question ? '「' + question + '」' : '';

      // 顯示題目圖片
      const existingImg = document.getElementById('pollQuestionImg');
      if (existingImg) existingImg.remove();
      if (imageData) {
        const img = document.createElement('img');
        img.id = 'pollQuestionImg';
        img.src = imageData;
        img.style.cssText = 'max-width:100%;max-height:250px;border-radius:8px;margin-bottom:15px;display:block;margin-left:auto;margin-right:auto;';
        document.getElementById('activeQuestion').after(img);
      }

      const total = Object.values(votesMap).reduce((s,v) => s+v, 0);
      document.getElementById('voteTotalCount').textContent = total;

      const bars = document.getElementById('voteBars');
      bars.innerHTML = '';
      const maxVotes = Math.max(...Object.values(votesMap), 1);

      options.forEach((opt, i) => {
        const count = votesMap[opt] || 0;
        const pct = total > 0 ? Math.round((count/total)*100) : 0;
        const width = maxVotes > 0 ? (count/maxVotes)*100 : 0;

        const row = document.createElement('div');
        row.className = 'bar-row';
        row.innerHTML = `
          <div class="bar-label">${opt}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.max(width, 5)}%;background:${BAR_COLORS[i%BAR_COLORS.length]}">
              ${pct}%
            </div>
          </div>
          <div class="bar-count">${count}</div>`;
        bars.appendChild(row);
      });
    }

    function listenToPoll() {
      if (pollListener) pollListener();
      if (votesListener) votesListener();

      pollListener = db.collection('active_poll').doc('current').onSnapshot(doc => {
        if (doc.exists && doc.data().active) {
          const data = doc.data();
          currentPollId = doc.id;
          document.getElementById('pollSetup').style.display = 'none';
          document.getElementById('noPollMsg').style.display = 'none';
          document.getElementById('startPollBtn').style.display = 'none';
          document.getElementById('stopPollBtn').style.display = 'block';

          // Listen for votes
          if (votesListener) votesListener();
          votesListener = db.collection('votes')
            .where('pollId', '==', 'current')
            .onSnapshot(voteSnap => {
              const votesMap = {};
              voteSnap.forEach(v => {
                const opt = v.data().option;
                votesMap[opt] = (votesMap[opt]||0) + 1;
              });
              renderVoteResults(data.question, data.options, votesMap, data.image);
            });
        } else {
          currentPollId = null;
          if (votesListener) { votesListener(); votesListener = null; }
          document.getElementById('pollSetup').style.display = 'block';
          document.getElementById('startPollBtn').style.display = 'block';
          document.getElementById('stopPollBtn').style.display = 'none';
          document.getElementById('pollResults').style.display = 'none';
          document.getElementById('noPollMsg').style.display = 'block';
        }
      });
    }

    listenToPoll();

    // ===== URL =====
    const baseUrl = window.location.origin + window.location.pathname.replace(/index\.html$/,'');
    document.getElementById('submitUrl').textContent = baseUrl + 'submit.html';
    document.getElementById('embedCode').textContent = `<iframe src="${baseUrl}" width="100%" height="650" frameborder="0"></iframe>`;
    document.getElementById('submitPageLink').href = baseUrl + 'submit.html';

    // ===== QR Code =====
    const submitUrl = baseUrl + 'submit.html';
    let qrCreated = false;

    function toggleQR() {
      const overlay = document.getElementById('qrOverlay');
      overlay.classList.toggle('show');
      if (overlay.classList.contains('show') && !qrCreated) {
        new QRCode(document.getElementById('qrcode'), {
          text: submitUrl,
          width: 256,
          height: 256,
          colorDark: '#1a1a2e',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.H
        });
        document.getElementById('qrUrl').textContent = submitUrl;
        qrCreated = true;
      }
    }

    // ===== 初始化：確保 active_mode 文件存在 =====
    db.collection('active_mode').doc('current').get().then(doc => {
      if (!doc.exists) {
        db.collection('active_mode').doc('current').set({
          mode: 'waiting',
          updated_at: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
    });
  </script>
</body>
</html>
